name: Daily Translation Alert

on:
  schedule:
    - cron: '0 11 * * *'  # 08:00 BRT (UTC-3 = 11:00 UTC )
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  translation-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser 2>/dev/null || \
          sudo apt-get install -y chromium 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 python-dotenv

      - name: Send daily translation alert
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          TC_COOKIE_LGN: ${{ secrets.TC_COOKIE_LGN }}
        run: |
          cd scripts && python alerta_traducao.py

      - name: Commit updated seen history (fallback local)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/traducao_seen.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update translation seen history [skip ci]"
          git push || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "Translation alert job failed at $(date)"
          exit 1
